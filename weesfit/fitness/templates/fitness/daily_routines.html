{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Routines - Wees Fit</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      background: linear-gradient(to bottom right, #f0f4ff, #e6f7ff);
      font-family: 'Segoe UI', sans-serif;
    }
    .routine-form {
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .routine-list {
      margin-top: 30px;
    }
  </style>
</head>
<body>
<div class="container py-5">
  <h2 class="text-center mb-4">Daily Routines</h2>
  <div class="routine-form">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Workout</label>
        <textarea name="workout" class="form-control" required></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Diet</label>
        <textarea name="diet" class="form-control" required></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Notes (optional)</label>
        <textarea name="notes" class="form-control"></textarea>
      </div>
      <button type="submit" class="btn btn-primary w-100">Log Routine</button>
    </form>
  </div>

  <div class="routine-list mt-5">
    <h4 class="mb-3">Your Previous Routines</h4>
    {% for r in routines %}
    <div class="card mb-3">
      <div class="card-body">
        <h5 class="card-title">{{ r.date }}</h5>
        <p><strong>Workout:</strong> {{ r.workout }}</p>
        <p><strong>Diet:</strong> {{ r.diet }}</p>
        <p><strong>Notes:</strong> {{ r.notes|default:"-" }}</p>
      </div>
    </div>
    {% empty %}
    <p>No routines logged yet.</p>
    {% endfor %}
  </div>
</div>
</body>
</html>
