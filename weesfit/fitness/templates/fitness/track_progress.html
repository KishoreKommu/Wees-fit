{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Objectives | Wees Fit</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <style>
    :root {
      --primary: #6366f1;
      --secondary: #0ea5e9;
      --bg-dark: #0f172a;
      --surface: #ffffff;
      --border: #e2e8f0;
      --success: #10b981;
    }

    body {
      background-color: #f8fafc;
      background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.03) 0px, transparent 50%);
      color: var(--bg-dark);
      font-family: 'Plus Jakarta Sans', sans-serif;
      padding-bottom: 120px;
    }

    /* --- Back Navigation --- */
    .btn-floating-back {
      position: fixed;
      top: 30px;
      left: 30px;
      background: white;
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 14px;
      color: var(--bg-dark);
      text-decoration: none;
      font-weight: 700;
      transition: 0.3s;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
    }

    .btn-floating-back:hover {
      background: var(--bg-dark);
      color: white;
      transform: translateX(-5px);
    }

    /* --- Header --- */
    .page-header {
      padding: 100px 0 50px;
      text-align: center;
    }

    .page-header h1 {
      font-weight: 800;
      letter-spacing: -2px;
      font-size: 3rem;
    }

    /* --- Objective Cards --- */
    .objective-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 35px;
      margin-bottom: 30px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
    }

    .section-title {
      font-weight: 800;
      font-size: 1.4rem;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title i { color: var(--primary); }

    /* --- Custom Checkbox List --- */
    .task-item {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      background: #f1f5f9;
      border-radius: 18px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.3s;
      border: 1px solid transparent;
    }

    .task-item:hover {
      background: #e2e8f0;
    }

    .task-item.completed {
      background: rgba(16, 185, 129, 0.1);
      border-color: var(--success);
    }

    .task-item.completed span {
      text-decoration: line-through;
      color: var(--success);
      opacity: 0.7;
    }

    .custom-check {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-radius: 8px;
      margin-right: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      transition: 0.3s;
    }

    .task-item.completed .custom-check {
      background: var(--success);
      border-color: var(--success);
    }

    .task-item.completed .custom-check i {
      color: white;
      display: block !important;
    }

    /* --- Floating Progress Dock --- */
    .progress-dock {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 600px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(12px);
      padding: 20px 30px;
      border-radius: 100px;
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 1000;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
    }

    .progress-text {
      color: white;
      font-weight: 800;
      min-width: 50px;
    }

    .progress-container-elite {
      flex: 1;
      height: 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar-elite {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      width: 0%;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body>

  <a href="{% url 'home' %}" class="btn-floating-back">
    <i class="bi bi-arrow-left"></i> Dashboard
  </a>

  <div class="container">
    <header class="page-header" data-aos="fade-down">
      <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill mb-3 fw-bold">Consistency Tracker</span>
      <h1>Daily <span class="text-primary">Objectives</span></h1>
      <p class="text-muted fs-5">Success is the sum of small efforts repeated daily.</p>
    </header>

    <div class="row">
      <div class="col-lg-6">
        <div class="objective-card" data-aos="fade-up">
          <div class="section-title">
            <i class="bi bi-lightning-charge-fill"></i> Performance Routines
          </div>
          {% for routine in daily_routines %}
          <label class="task-item">
            <input type="checkbox" class="task-checkbox d-none" onchange="toggleTask(this)">
            <div class="custom-check"><i class="bi bi-check d-none"></i></div>
            <span>{{ routine }}</span>
          </label>
          {% endfor %}
        </div>
      </div>

      <div class="col-lg-6">
        <div class="objective-card" data-aos="fade-up" data-aos-delay="100">
          <div class="section-title">
            <i class="bi bi-heart-pulse-fill"></i> Wellness Targets
          </div>
          {% for tip in health_tips %}
          <label class="task-item">
            <input type="checkbox" class="task-checkbox d-none" onchange="toggleTask(this)">
            <div class="custom-check"><i class="bi bi-check d-none"></i></div>
            <span>{{ tip }}</span>
          </label>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>

  <div class="progress-dock" data-aos="zoom-in" data-aos-offset="0">
    <div class="progress-text"><span id="percentText">0</span>%</div>
    <div class="progress-container-elite">
      <div class="progress-bar-elite" id="eliteBar"></div>
    </div>
    <div class="text-white small d-none d-md-block fw-bold">DAILY GOAL</div>
  </div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    AOS.init({ duration: 800, once: true });

    function toggleTask(checkbox) {
      const parent = checkbox.closest('.task-item');
      if (checkbox.checked) {
        parent.classList.add('completed');
      } else {
        parent.classList.remove('completed');
      }
      updateProgress();
    }

    function updateProgress() {
      const checkboxes = document.querySelectorAll('.task-checkbox');
      const total = checkboxes.length;
      let completed = 0;
      checkboxes.forEach(cb => { if(cb.checked) completed++; });
      
      const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
      
      const progressBar = document.getElementById('eliteBar');
      const textDisplay = document.getElementById('percentText');
      
      progressBar.style.width = percent + '%';
      textDisplay.innerText = percent;
    }
  </script>
</body>
</html>
