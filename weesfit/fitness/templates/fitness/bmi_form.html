{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BMI Calculator - Wees Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg: #f6f7fb;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #7aa7c7; 
      --primary-600:#658eaa;
      --accent: #b6e0dc;
      --radius: 20px;
      --shadow: 0 8px 28px rgba(31,41,55,.08);
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(120deg, #eef5ff, #eaf7f4, #fff5f5);
      color: var(--text);
      padding: 20px;
    }
    .bmi-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .bmi-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(31,41,55,.12);
    }
    .bmi-card h2 {
      font-weight: 700;
      font-size: 1.8rem;
      color: var(--primary-600);
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .form-label {
      font-weight: 500;
      color: var(--muted);
    }
    .form-control {
      border-radius: 12px;
      padding: 14px;
      border: 1px solid #e5e7eb;
      transition: all 0.2s;
    }
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(122,167,199,.25);
    }
    .btn-calc {
      width: 100%;
      margin-top: 20px;
      background: var(--primary);
      color: #fff;
      border-radius: 30px;
      padding: 14px;
      font-weight: 600;
      font-size: 1.05rem;
      border: none;
      transition: all 0.25s;
    }
    .btn-calc:hover {
      background: var(--primary-600);
      box-shadow: 0 6px 18px rgba(122,167,199,.35);
      transform: translateY(-2px);
    }
    .btn-home {
      position: fixed;
      top: 20px;
      left: 20px;
      background: var(--accent);
      color: var(--text);
      border-radius: 30px;
      padding: 8px 18px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 5px 15px rgba(31,41,55,.1);
      transition: all 0.2s;
    }
    .btn-home:hover {
      background: var(--primary);
      color: #fff;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <a href="{% url 'home' %}" class="btn-home">🏠 Home</a>
  <div class="bmi-card">
    <h2>BMI Calculator</h2>
    <form method="POST" action="{% url 'bmi_result' %}">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Height (cm)</label>
        <input type="number" name="height" class="form-control" placeholder="Enter your height" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Weight (kg)</label>
        <input type="number" name="weight" class="form-control" placeholder="Enter your weight" required>
      </div>
      <button type="submit" class="btn-calc">Calculate BMI</button>
    </form>
  </div>
</body>
</html>
