{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Analyze Your Profile | Wees Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #6366f1;
      --secondary: #0ea5e9;
      --dark-bg: #0f172a;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f8fafc;
      /* Subtle background accents */
      background-image: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.05) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.05) 0px, transparent 50%);
      color: var(--text-main);
      padding: 20px;
    }

    /* --- Back Navigation --- */
    .btn-back {
      position: absolute;
      top: 30px;
      left: 30px;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.3s;
      padding: 8px 16px;
      border-radius: 12px;
      background: white;
      border: 1px solid var(--border-color);
    }

    .btn-back:hover {
      color: var(--primary);
      border-color: var(--primary);
      transform: translateX(-5px);
    }

    /* --- Professional Calculator Card --- */
    .bmi-container {
      background: var(--card-bg);
      border-radius: 32px;
      padding: 3rem;
      max-width: 520px;
      width: 100%;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 1);
      position: relative;
    }

    .header-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      margin: 0 auto 1.5rem;
      box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
    }

    .bmi-container h2 {
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: -1px;
      color: var(--dark-bg);
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .sub-text {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      font-size: 0.95rem;
    }

    /* --- Form Styling --- */
    .input-group-custom {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .input-group-custom i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      transition: 0.3s;
      z-index: 10;
    }

    .form-control-custom {
      width: 100%;
      padding: 16px 16px 16px 50px;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      background-color: #f1f5f9;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: var(--dark-bg);
    }

    .form-control-custom:focus {
      background-color: #fff;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
      outline: none;
    }

    .form-control-custom:focus + i {
      color: var(--primary);
    }

    .form-label-custom {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: block;
    }

    /* --- Action Button --- */
    .btn-calculate {
      width: 100%;
      margin-top: 1rem;
      background: var(--dark-bg);
      color: white;
      border-radius: 16px;
      padding: 18px;
      font-weight: 700;
      font-size: 1.1rem;
      border: none;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-calculate:hover {
      background: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
    }

    .info-footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      border-top: 1px solid #f1f5f9;
      padding-top: 1.5rem;
    }

    @media (max-width: 576px) {
      .bmi-container { padding: 2rem 1.5rem; }
      .btn-back { top: 15px; left: 15px; }
    }
  </style>
</head>
<body>

  <a href="{% url 'home' %}" class="btn-back">
    <i class="bi bi-arrow-left"></i> Back to Home
  </a>

  <div class="bmi-container">
    <div class="header-icon">
      <i class="bi bi-activity"></i>
    </div>
    
    <h2>Body Metrics</h2>
    <p class="sub-text">Enter your details to generate your performance score.</p>
    
    <form method="POST" action="{% url 'bmi_result' %}">
      {% csrf_token %}
      
      <div class="input-group-custom">
        <label class="form-label-custom">Stature (Height)</label>
        <input type="number" name="height" class="form-control-custom" placeholder="e.g. 175" required>
        <i class="bi bi-rulers"></i>
        <small style="position: absolute; right: 15px; top: 73%; transform: translateY(-50%); font-weight: 700; color: var(--text-muted);">cm</small>
      </div>
      
      <div class="input-group-custom">
        <label class="form-label-custom">Mass (Weight)</label>
        <input type="number" name="weight" class="form-control-custom" placeholder="e.g. 72" required>
        <i class="bi bi-speedometer2"></i>
        <small style="position: absolute; right: 15px; top: 73%; transform: translateY(-50%); font-weight: 700; color: var(--text-muted);">kg</small>
      </div>

      <button type="submit" class="btn-calculate">
        Generate Analysis <i class="bi bi-chevron-right"></i>
      </button>
    </form>

    <div class="info-footer">
      <i class="bi bi-shield-lock-fill me-1"></i> Your data is processed locally to ensure maximum privacy.
    </div>
  </div>

</body>
</html>
