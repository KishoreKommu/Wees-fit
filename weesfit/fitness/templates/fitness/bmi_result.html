{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Analysis Complete | Wees Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #6366f1;
      --secondary: #0ea5e9;
      --dark-bg: #0f172a;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      
      /* Result Colors */
      --color-under: #6366f1;
      --color-normal: #10b981;
      --color-over: #f59e0b;
      --color-obese: #ef4444;
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f8fafc;
      background-image: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.08) 0px, transparent 50%);
      padding: 20px;
    }

    /* --- Back Button --- */
    .btn-home {
      position: absolute;
      top: 30px;
      left: 30px;
      background: white;
      border: 1px solid var(--border-color);
      padding: 10px 20px;
      border-radius: 14px;
      color: var(--text-main);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }

    .btn-home:hover {
      background: var(--dark-bg);
      color: white;
      border-color: var(--dark-bg);
    }

    /* --- Result Card --- */
    .result-card {
      background: var(--card-bg);
      border-radius: 35px;
      padding: 4rem 3rem;
      max-width: 550px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(255, 255, 255, 1);
      text-align: center;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .analysis-header {
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 800;
      font-size: 0.85rem;
      color: var(--primary);
      margin-bottom: 2rem;
    }

    /* --- SVG Gauge System --- */
    .gauge-container {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0 auto 2rem;
    }

    svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    circle {
      fill: none;
      stroke-width: 12;
      stroke-linecap: round;
    }

    .track { stroke: #f1f5f9; }

    .progress {
      stroke-dasharray: 440;
      stroke-dashoffset: 440;
      transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.8s ease;
    }

    .value-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .bmi-number {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      display: block;
    }

    .bmi-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* --- Dynamic Category Badge --- */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: 100px;
      font-weight: 800;
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    .recommendation-box {
      background: #f8fafc;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 2.5rem;
      border: 1px solid var(--border-color);
    }

    .recommendation-box p {
      margin: 0;
      color: var(--text-main);
      font-weight: 500;
      line-height: 1.6;
    }

    /* --- Button Group --- */
    .action-stack {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn-action {
      padding: 16px;
      border-radius: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: 0.3s;
      font-size: 0.95rem;
    }

    .btn-primary-action {
      background: var(--dark-bg);
      color: white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .btn-primary-action:hover {
      background: var(--primary);
      color: white;
      transform: translateY(-3px);
    }

    .btn-secondary-action {
      background: white;
      color: var(--text-main);
      border: 1px solid var(--border-color);
    }

    .btn-secondary-action:hover {
      background: #f1f5f9;
      color: var(--primary);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <a href="{% url 'home' %}" class="btn-home">
    <i class="bi bi-house-door-fill"></i> Home
  </a>

  <div class="result-card">
    <div class="analysis-header">Performance Metrics</div>

    <div class="gauge-container">
      <svg viewBox="0 0 160 160">
        <circle class="track" cx="80" cy="80" r="70"></circle>
        <circle class="progress" id="bmiGauge" cx="80" cy="80" r="70"></circle>
      </svg>
      <div class="value-display">
        <span class="bmi-number" id="bmiDisplay">{{ bmi }}</span>
        <span class="bmi-label">BMI Score</span>
      </div>
    </div>

    <div id="statusBadge" class="status-badge">
      <i class="bi bi-shield-check"></i> <span>--</span>
    </div>

    <div class="recommendation-box">
      <p id="planText">{{ plan }}</p>
    </div>

    <div class="action-stack">
      <a href="{% url 'bmi_plan' %}?bmi={{ bmi }}" class="btn-action btn-primary-action">
        Get My Plan <i class="bi bi-arrow-right ms-1"></i>
      </a>
      <a href="{% url 'bmi_form' %}" class="btn-action btn-secondary-action">
        Recalculate
      </a>
    </div>
  </div>

  <script>
    const bmi = parseFloat("{{ bmi|escapejs }}");
    const gauge = document.getElementById('bmiGauge');
    const badge = document.getElementById('statusBadge');
    const bmiDisplay = document.getElementById('bmiDisplay');

    // Gauge Logic (Max BMI Scale 40)
    const radius = 70;
    const circumference = 2 * Math.PI * radius;
    const percent = Math.min((bmi / 40) * 100, 100);
    const offset = circumference - (percent / 100) * circumference;

    // Set Gauge
    gauge.style.strokeDasharray = circumference;
    setTimeout(() => {
      gauge.style.strokeDashoffset = offset;
    }, 100);

    // Color & Status Logic
    let statusColor, statusText;

    if (bmi < 18.5) {
      statusColor = 'var(--color-under)';
      statusText = 'Underweight';
      badge.style.background = 'rgba(99, 102, 241, 0.1)';
    } else if (bmi < 24.9) {
      statusColor = 'var(--color-normal)';
      statusText = 'Ideal Range';
      badge.style.background = 'rgba(16, 185, 129, 0.1)';
    } else if (bmi < 29.9) {
      statusColor = 'var(--color-over)';
      statusText = 'Overweight';
      badge.style.background = 'rgba(245, 158, 11, 0.1)';
    } else {
      statusColor = 'var(--color-obese)';
      statusText = 'Obese Range';
      badge.style.background = 'rgba(239, 68, 68, 0.1)';
    }

    gauge.style.stroke = statusColor;
    badge.style.color = statusColor;
    badge.querySelector('span').innerText = statusText;
    bmiDisplay.style.color = statusColor;

  </script>
</body>

</html>
