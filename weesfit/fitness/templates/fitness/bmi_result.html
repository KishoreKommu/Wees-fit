{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Your BMI Result - Wees Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f6f7fb;
      --surface: rgba(255, 255, 255, 0.85);
      --primary: #7aa7c7;
      --primary-600: #658eaa;
      --accent-green: #66bb6a;
      --accent-yellow: #f6c851;
      --accent-red: #ef5350;
      --muted: #6b7280;
      --text: #1f2937;
      --shadow: 0 6px 24px rgba(31, 41, 55, 0.08);
      --radius: 20px;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: url("{% static 'images/weesfit-bg.jpeg' %}") no-repeat center/cover fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(246, 247, 251, 0.75);
      backdrop-filter: blur(10px);
    }

    .result-container {
      position: relative;
      z-index: 2;
      max-width: 480px;
      width: 100%;
      padding: 40px 30px;
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      text-align: center;
      animation: fadeIn 0.4s ease-in-out;
    }

    .result-container h2 {
      font-weight: 600;
      font-size: 1.6rem;
      color: var(--primary);
      margin-bottom: 25px;
    }

    .circle-container {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 0 auto 20px auto;
    }

    svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    circle {
      fill: none;
      stroke-width: 14;
      stroke-linecap: round;
    }

    .bg-circle {
      stroke: rgba(0, 0, 0, 0.08);
    }

    .progress-circle {
      stroke: var(--primary);
      stroke-dasharray: 440;
      stroke-dashoffset: 440;
      transition: stroke-dashoffset 1s ease, stroke 0.5s ease;
    }

    .circle-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--primary-600);
    }

    .lead {
      font-size: 1rem;
      margin-bottom: 25px;
      color: var(--muted);
    }

    .btn-soft {
      margin-top: 10px;
      background: var(--primary);
      color: #fff;
      border-radius: 30px;
      padding: 10px 22px;
      border: none;
      font-weight: 500;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(122, 167, 199, 0.3);
    }

    .btn-soft:hover {
      background: var(--primary-600);
      transform: translateY(-2px);
      text-decoration: none;
    }

    .btn-home {
      position: fixed;
      top: 20px;
      left: 20px;
      background: var(--primary);
      color: #fff;
      border-radius: 30px;
      padding: 8px 20px;
      font-weight: 500;
      text-decoration: none;
      z-index: 10;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(122, 167, 199, 0.3);
    }

    .btn-home:hover {
      background: var(--primary-600);
      text-decoration: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="overlay"></div>

  <a href="{% url 'home' %}" class="btn-home">🏠 Home</a>

  <div class="result-container">
    <h2>Your BMI</h2>

    <div class="circle-container">
      <svg>
        <circle class="bg-circle" cx="80" cy="80" r="70"></circle>
        <circle class="progress-circle" cx="80" cy="80" r="70"></circle>
      </svg>
      <div class="circle-text" id="bmiValue">{{ bmi }}</div>
    </div>

    <p class="lead">{{ plan }}</p>

    <a href="{% url 'bmi_form' %}" class="btn-soft">Recalculate</a>
    <a href="{% url 'bmi_plan' %}?bmi={{ bmi }}" class="btn-soft">Get Custom Plan</a>
  </div>

  <script>
    const bmi = parseFloat("{{ bmi|escapejs }}");
    const maxBMI = 40;
    const progressCircle = document.querySelector('.progress-circle');

    const percent = Math.min((bmi / maxBMI) * 100, 100);
    const radius = 70;
    const circumference = 2 * Math.PI * radius;
    const offset = circumference - (percent / 100) * circumference;

    progressCircle.style.strokeDashoffset = offset;

    if (bmi < 18.5) progressCircle.style.stroke = "#7aa7c7"; // underweight - pale blue
    else if (bmi < 24.9) progressCircle.style.stroke = "var(--accent-green)"; // normal - green
    else if (bmi < 29.9) progressCircle.style.stroke = "var(--accent-yellow)"; // overweight - yellow
    else progressCircle.style.stroke = "var(--accent-red)"; // obese - red
  </script>
</body>

</html>
